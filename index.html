<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOON</title>
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>


  <header>
    <nav class="container">

      <a href="#" class="logo">
        <img src="image.png" alt="Moon Logo"/>
      </a>

      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#collection">Shop</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <div class="nav-icons">

  <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
  <a href="#"><i class="fa-regular fa-user"></i></a>
  <a href="#"><i class="fa-regular fa-heart"></i></a>
  <a href="#"><i class="fa-solid fa-bag-shopping"></i></a>

  <div class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

</div>

    </nav>
  </header>

  


  <section class="hero">

    <div class="hero-text">
      <img class="hero-symbol" src="1772370972188_image.png" alt="Moon symbol"/>
      <p class="hero-subtitle">Handcrafted in Viet Nam since 1650</p>
      <h1 class="hero-title">Bat Trang<br/>Dinner Set</h1>
      <a href="#collection" class="btn-outline">Shop Now</a>
    </div>

    <div class="hero-image">
      <img src="f3cba1d65779571795e3a3e8f55f7ec01d571873.jpg" alt="Bat Trang Ceramics"/>
    </div>

  </section>


  <section id="collection">
    <div class="container">

      <div class="section-header">
        <p class="label">Explore</p>
        <h2>Our Collections</h2>
      </div>

      <div class="collection-wrapper">
        <div class="collection-grid">

          <div class="card">
            <div class="card-img">
              <img src="e04ed7ee144833da2a15af60c326fd7767a48e5a.jpg" alt="Tableware"/>
            </div>
            <div class="card-overlay">
              <p class="category">Ceramics</p>
              <h3>Tableware</h3>
            </div>
          </div>

          <div class="card">
            <div class="card-img">
              <img src="285b621f3f9dc455766672257908e989c6219d12.jpg" alt="Home Decor"/>
            </div>
            <div class="card-overlay">
              <p class="category">Interior</p>
              <h3>Home Decor</h3>
            </div>
          </div>

          <div class="card">
            <div class="card-img">
              <img src="f3cba1d65779571795e3a3e8f55f7ec01d571873.jpg" alt="Holiday"/>
            </div>
            <div class="card-overlay">
              <p class="category">Seasonal</p>
              <h3>Holiday</h3>
            </div>
          </div>

          <div class="card">
            <div class="card-img">
              <img src="7ee2a4948bb51c102a7ace7d433ffe28811bba70.jpg" alt="Collection"/>
            </div>
            <div class="card-overlay">
              <p class="category">Featured</p>
              <h3>Collection</h3>
            </div>
          </div>

        </div>
      </div>

    </div>
  </section>



</body>
</html>
