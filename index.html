<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Moon</title>

  <link rel="stylesheet" href="style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Jost&family=Cormorant+Garamond&display=swap" rel="stylesheet" />
</head>

<body>

  <header>
    <div class="container nav">
      <img src="assist/img/logo.png" class="logo" />

      <ul class="nav-links">
        <li>Home</li>
        <li>Shop</li>
        <li>About</li>
        <li>Contact</li>
      </ul>

      <div class="icons">
        <div class="icons">
          <ul>
            <li><img src="assist/img/Search.svg" /></li>
            <li><img src="assist/img/Avatar.svg" /></li>
            <li><img src="assist/img/Heart.svg" /></li>
            <li><img src="assist/img/Shopping cart.svg" /></li>
          </ul>
        </div>

      </div>
      
        <div class="Menu">
          <img src="./assist/img/Menu.png" />
        </div>
    </div>
  </header>


  <section class="hero">
    <div class="hero-text">
      <p>Handcrafted in Viet Nam since 1650</p>

      <h1>BAT TRANG<br />DINNER SET</h1>

      <button>SHOP NOW</button>
    </div>

    <div class="hero-img">
      <img src="assist/img/hero.png" />
    </div>
  </section>


  <section class="collection">
    <div class="container">
      <h2 class="title">Our Collection</h2>

      <div class="grid">
        <div class="card">
          <img src="assist/img/1.jpg" />
          <p>TABLEWARE</p>
        </div>

        <div class="card">
          <img src="assist/img/2.jpg" />
          <p>HOME DECOR</p>
        </div>

        <div class="card">
          <img src="assist/img/3.jpg" />
          <p>HOLIDAY</p>
        </div>

        <div class="card">
          <img src="assist/img/4.jpg" />
          <p>COLLECTION</p>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
